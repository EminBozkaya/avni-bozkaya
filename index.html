        <section>
          <h2>Şair Avni Bozkaya (Güldalı) Kimdir?</h2>
          <p><strong>Avni Bozkaya</strong>, <strong>Erzurum</strong>'un <strong>Pasinler</strong> (<strong>Hasankale</strong>) ilçesinden bir <strong>şair</strong> ve <strong>matematik öğretmeni</strong>dir. <strong>Güldalı</strong> mahlasını kullanan <strong>Dadaş Avni Bozkaya</strong>, <strong>Erzurum genci</strong> olarak yetişmiş, <strong>Pasinler şair</strong>i olarak tanınmaktadır. Şiirlerinde <strong>canım Erzurum</strong>'un dadaş kültürünü, <strong>canım Pasinler</strong>'in doğal güzelliklerini, vatan sevgisini ve ahlaki değerleri işlemektedir. <strong>Dadaşım</strong>, <strong>can dadaşım</strong> diyerek Erzurum sevdasını dile getirmektedir.</p>
          <p><strong>Erzurum şair</strong>i olarak bilinen Avni Bozkaya, <strong>matematik öğretmeni</strong> kimliğiyle de tanınır. <strong>Metem</strong> çalışmalarıyla ve <strong>Güldalı Avni Bozkaya</strong> imzasıyla edebiyat dünyasında kendine yer edinmiştir. <strong>Erzurum şiiri</strong>, <strong>Pasinler şiiri</strong> ve <strong>Hasankale şiiri</strong> denildiğinde akla gelen önemli isimlerden biridir. <strong>Can Erzurum</strong>, <strong>can Pasinler</strong> temalı eserleri arasında "Canım Pasinler", "Canım Erzurum", "Erzurum Genciyiz" gibi şiirler öne çıkmaktadır.</p>
